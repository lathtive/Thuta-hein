<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

body{
    background:linear-gradient(to bottom,#8ee9ff,#b8f3ff);
}

form{
    max-width:700px;
    margin:auto;
}

.w3-card-4{
    transition:.35s;
}

.w3-card-4:hover{
    transform:translateY(-8px);
}

.w3-input,.w3-select,.w3-button{
    transition:.3s;
}

.w3-input:focus,
textarea:focus{
    border:2px solid #2196F3!important;
    box-shadow:0 0 12px rgba(33,150,243,.4);
}

.w3-button:hover{
    transform:scale(1.05);
}

.logo{
    transition:.4s;
}

.logo:hover{
    transform:rotate(10deg) scale(1.1);
}

</style>

</head>

<body>

<div class="w3-center w3-padding-32 w3-animate-top">

<img src="logo.jpg"
class="logo w3-circle w3-card"
style="width:110px;height:110px;">

<h1><b>AI</b></h1>

</div>

<nav class="w3-bar w3-blue-gray w3-card w3-animate-opacity">

<a href="index.html" class="w3-bar-item w3-button w3-hover-blue">Home</a>

<a href="about.html" class="w3-bar-item w3-button w3-hover-blue">About</a>

<a href="contact.html" class="w3-bar-item w3-button w3-blue">Contact</a>

</nav>

<div class="w3-container w3-padding-48">

<div class="w3-card-4 w3-white w3-round-xxlarge w3-padding-32 w3-animate-zoom">

<h2 class="w3-center">

<i class="fa-solid fa-envelope"></i>

Contact Us

</h2>

<p class="w3-center w3-text-grey">

Have a question or suggestion? We'd love to hear from you.

</p>

<form>

<label>
<i class="fa-solid fa-user"></i>
Username
</label>

<input
class="w3-input w3-border w3-round-large"
type="text"
placeholder="Enter your name">

<br>

<label>
<i class="fa-solid fa-envelope"></i>
Email
</label>

<input
class="w3-input w3-border w3-round-large"
type="email"
placeholder="example@email.com">

<br>

<label>
<i class="fa-solid fa-lightbulb"></i>
Subject
</label>

<input
class="w3-input w3-border w3-round-large"
type="text"
placeholder="Topic">

<br>

<label>
<i class="fa-solid fa-comment"></i>
Message
</label>

<textarea
class="w3-input w3-border w3-round-large"
rows="6"
placeholder="Write your message..."></textarea>

<br>

<div class="w3-center">

<button class="w3-button w3-blue w3-round-large w3-hover-indigo w3-hover-shadow">

<i class="fa-solid fa-paper-plane"></i>

Send Message

</button>

</div>

</form>

</div>

</div>

<div class="w3-container w3-padding">

<div class="w3-row-padding">

<div class="w3-third">

<div class="w3-card w3-round-large w3-pale-blue w3-padding w3-hover-shadow">

<h3><i class="fa-solid fa-location-dot"></i></h3>

<p>Yangon, Myanmar</p>

</div>

</div>

<div class="w3-third">

<div class="w3-card w3-round-large w3-pale-green w3-padding w3-hover-shadow">

<h3><i class="fa-solid fa-phone"></i></h3>

<p>+95 XXX XXX XXX</p>

</div>

</div>

<div class="w3-third">

<div class="w3-card w3-round-large w3-pale-yellow w3-padding w3-hover-shadow">

<h3><i class="fa-solid fa-envelope"></i></h3>

<p>ai@example.com</p>

</div>

</div>

</div>

</div>

<footer class="w3-blue-gray w3-center w3-padding-24 w3-margin-top w3-animate-bottom">

<p>© 2026 Computing by AI</p>

</footer>

</body>
</html>
